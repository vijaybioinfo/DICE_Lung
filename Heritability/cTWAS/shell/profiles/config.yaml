jobs: 250
latency-wait: 60

snakefile: "/PATH/TO/SNAKE/FILE/Snakefile"

cluster:
  mkdir -p logs/{rule} &&
  sbatch
    --parsable
    --job-name=s.{rule}
    --partition=compute
    --nodes=1
    --ntasks=1
    --cpus-per-task={threads}
    --mem={resources.mem_gb}GB
    --time={resources.walltime}
    --output=logs/{rule}/s.{rule}.o%j
    --error=logs/{rule}/s.{rule}.e%j

cluster-status: ./shell/profiles/slurm/status-sacct.sh
jobscript: ./shell/profiles/slurm/slurm-jobscript.sh
skip-script-cleanup: True

cluster-cancel: scancel
cluster-cancel-nargs: 100

default-resources:
  - threads=1
  - mem_gb=10
  - walltime=60

printshellcmds: True

restart-times: 1
keep-going: True

rerun-triggers: mtime
rerun-incomplete: True

local-cores: 1
max-jobs-per-second: 100
max-status-checks-per-second: 10

use-conda: True